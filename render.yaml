services:
  - type: web
    name: tracking-python-api
    runtime: python
    rootDir: python-service
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python -m uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: ML_DATA_DIR
        value: /tmp/ml
      - key: ML_BASELINE_MIN_POINTS
        value: "50"
      - key: ML_ANOMALY_THRESHOLD
        value: "0.65"
